<!-- frontend/pages/perfilacademico.html -->
<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Academico - SkillMatch</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Nuestro CSS -->
    <link rel="stylesheet" href="../css/perfilacademico.css">
</head>
<body class="bg-light">  
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <!-- cabecera -->
                    <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                        <i class="fas fa-handshake fa-3x mb-3"></i>
                        <h2 class="fw-bold">SkillMatch</h2>
                        <p class="mb-0">Completa tu perfil académico</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="perfilForm">
                            <!-- Intereses academicos -->
                            <div class="mb-3">
                                <label for="intereses" class="form-label fw-semibold">
                                    <i class="fas fa-star me-2 text-primary"></i>Intereses Académicos
                                </label>
                                <select class="form-select form-select-lg" id="intereses" multiple size="3">
                                    <option value="Programación">Programación</option>
                                    <option value="Diseño Gráfico">Diseño Gráfico</option>
                                    <option value="Ciencia de Datos">Ciencia de Datos</option>
                                    <option value="Inteligencia Artificial">Inteligencia Artificial</option>
                                    <option value="Investigación">Investigación</option>
                                    <option value="Matemáticas">Matemáticas</option>
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Educación">Educación</option>
                                    <option value="Medio Ambiente">Medio Ambiente</option>
                                    <option value="Comunicación">Comunicación</option>
                                    <option value="Innovación Tecnológica">Innovación Tecnológica</option>
                                </select>
                                <small class="text-muted">Selecciona múltiples con Ctrl (Cmd en Mac)</small>
                            </div>

                            <!-- Habilidades -->
                            <div class="mb-3">
                                <label for="habilidades" class="form-label fw-semibold">
                                    <i class="fas fa-cog me-2 text-primary"></i>Habilidades
                                </label>
                                <select class="form-select form-select-lg" id="habilidades" multiple size="3">
                                    <option value="Trabajo en equipo">Trabajo en equipo</option>
                                    <option value="Liderazgo">Liderazgo</option>
                                    <option value="Comunicación oral">Comunicación oral</option>
                                    <option value="Comunicación escrita">Comunicación escrita</option>
                                    <option value="Resolución de problemas">Resolución de problemas</option>
                                    <option value="Gestión de proyectos">Gestión de proyectos</option>
                                    <option value="Diseño">Diseño</option>
                                    <option value="Programación">Programación</option>
                                    <option value="Investigación">Investigación</option>
                                    <option value="Organización">Organización</option>
                                    <option value="Análisis crítico">Análisis crítico</option>
                                </select>
                            </div>

                            <!-- Tipos de proyectos -->
                            <div class="mb-3">
                                <label for="tipos_proyecto" class="form-label fw-semibold">
                                    <i class="fas fa-project-diagram me-2 text-primary"></i>Tipos de Proyecto de Interés
                                </label>
                                <select class="form-select form-select-lg" id="tipos_proyecto" multiple size="3">
                                    <option value="Proyectos de investigación">Proyectos de investigación</option>
                                    <option value="Proyectos sociales">Proyectos sociales</option>
                                    <option value="Proyectos de desarrollo (software/app)">Proyectos de desarrollo</option>
                                    <option value="Proyectos creativos o artísticos">Proyectos creativos</option>
                                    <option value="Proyectos académicos">Proyectos académicos</option>
                                    <option value="Proyectos ambientales">Proyectos ambientales</option>
                                    <option value="Proyectos empresariales">Proyectos empresariales</option>
                                    <option value="Proyectos tecnológicos">Proyectos tecnológicos</option>
                                </select>
                            </div>

                            <!-- Temas que te gustan aprender -->
                            <div class="mb-3">
                                <label for="temas_aprender" class="form-label fw-semibold">
                                    <i class="fas fa-book-open me-2 text-primary"></i>Temas que te gusta aprender
                                </label>
                                <select class="form-select form-select-lg" id="temas_aprender" multiple size="3">
                                    <option value="Inteligencia artificial">Inteligencia artificial</option>
                                    <option value="Programación">Programación</option>
                                    <option value="Educación">Educación</option>
                                    <option value="Psicología">Psicología</option>
                                    <option value="Medio ambiente">Medio ambiente</option>
                                    <option value="Ciencia de datos">Ciencia de datos</option>
                                    <option value="Emprendimiento">Emprendimiento</option>
                                    <option value="Arte y diseño">Arte y diseño</option>
                                    <option value="Economía">Economía</option>
                                    <option value="Robótica">Robótica</option>
                                    <option value="Innovación">Innovación</option>
                                </select>
                            </div>

                            <!-- Rol preferido -->
                            <div class="mb-4">
                                <label for="rol_preferido" class="form-label fw-semibold">
                                    <i class="fas fa-user-tag me-2 text-primary"></i>Rol Preferido en Equipos
                                </label>
                                <select class="form-select form-select-lg" id="rol_preferido" required>
                                    <option value="">Selecciona tu rol preferido</option>
                                    <option value="Líder">Líder</option>
                                    <option value="Investigador">Investigador</option>
                                    <option value="Diseñador">Diseñador</option>
                                    <option value="Programador">Programador</option>
                                    <option value="Documentador">Documentador</option>
                                    <option value="Presentador">Presentador</option>
                                    <option value="Analista">Analista</option>
                                    <option value="Coordinador">Coordinador</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary btn-lg w-50" id="botonomitir">
                                    <i class="fas fa-times me-2"></i>Omitir
                                </button>
                                <button type="submit" class="btn btn-primary btn-lg w-50" id="botonaceptar">
                                    <i class="fas fa-check me-2"></i>Guardar Perfil
                                </button>
                            </div>
                        </form>
                    </div>
                </div>                
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Nuestro JS -->
    <script src="../js/perfilacademico.js"></script>
</body>
</html>
