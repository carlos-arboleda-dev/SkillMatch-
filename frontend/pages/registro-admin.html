<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Admin - SkillMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                        <i class="fas fa-user-shield fa-3x mb-3"></i>
                        <h2 class="fw-bold">SkillMatch Admin</h2>
                        <p class="mb-0">Registro de administradores</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerAdminForm">
                            <!-- Nombre completo -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">
                                    <i class="fas fa-user me-2 text-primary"></i>Nombre completo
                                </label>
                                <input type="text" class="form-control form-control-lg" id="nombre" 
                                       placeholder="Nombre completo" required>
                            </div>

                            <!-- Email institucional -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">
                                    <i class="fas fa-envelope me-2 text-primary"></i>Correo institucional
                                </label>
                                <input type="email" class="form-control form-control-lg" id="email" 
                                       placeholder="admin@udenar.edu.co" required>
                                <small class="text-muted">Debe ser correo institucional válido</small>
                            </div>

                            <!-- Código (opcional para admins) -->
                            <div class="mb-3">
                                <label for="codigo" class="form-label fw-semibold">
                                    <i class="fas fa-id-card me-2 text-primary"></i>Código (opcional)
                                </label>
                                <input type="text" class="form-control form-control-lg" id="codigo" 
                                       placeholder="Código si aplica">
                            </div>

                            <!-- Contraseña -->
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="fas fa-lock me-2 text-primary"></i>Contraseña
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password" 
                                       placeholder="Mínimo 6 caracteres" required>
                            </div>

                            <!-- Campo oculto para rol -->
                            <input type="hidden" id="rol" value="admin">

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="btnRegistro">
                                <i class="fas fa-user-plus me-2"></i>Registrar Administrador
                            </button>

                            <div class="text-center">
                                <a href="login.html" class="text-primary">Volver al login</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/registro-admin.js"></script>
</body>
</html>
