<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SkillMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/editar-perfil.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white">
                        <h4>Editar Perfil</h4>
                    </div>
                    <div class="card-body">
                        <!-- En editar-perfil.html, reemplaza el formulario completo -->
                        <form id="editarPerfilForm">
                            <!-- Información básica -->
                            <h5 class="text-success">Información básica</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control" id="nombre" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Universidad</label>
                                    <input type="text" class="form-control" id="universidad" value="Universidad de Nariño" readonly>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Carrera</label>
                                    <input type="text" class="form-control" id="carrera" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Semestre</label>
                                    <input type="number" class="form-control" id="semestre" min="1" max="12">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ciudad</label>
                                <input type="text" class="form-control" id="ciudad" placeholder="Pasto">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Cambiar foto de perfil</label>
                                <input type="file" class="form-control" id="foto" accept="image/*">
                                <small class="text-muted">Funcionalidad de foto próximamente</small>
                            </div>

                            <!-- Intereses académicos -->
                            <h5 class="text-success mt-4">Intereses académicos</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Intereses académicos</label>
                                <select class="form-select" id="intereses" multiple size="4">
                                    <option value="Programación">Programación</option>
                                    <option value="Ecosistemas">Ecosistemas</option>
                                    <option value="Inteligencia Artificial">Inteligencia Artificial</option>
                                    <option value="Educación">Educación</option>
                                    <option value="Ciencia de Datos">Ciencia de Datos</option>
                                    <option value="Diseño Gráfico">Diseño Gráfico</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Temas que te gustan aprender</label>
                                <select class="form-select" id="temas_gustan" multiple size="4">
                                    <option value="IA">IA</option>
                                    <option value="Programación">Programación</option>
                                    <option value="Educación">Educación</option>
                                    <option value="Robótica">Robótica</option>
                                    <option value="Medio Ambiente">Medio Ambiente</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Habilidades</label>
                                <select class="form-select" id="habilidades" multiple size="4">
                                    <option value="Trabajo en equipo">Trabajo en equipo</option>
                                    <option value="Liderazgo">Liderazgo</option>
                                    <option value="Comunicación">Comunicación</option>
                                    <option value="Resolución de problemas">Resolución de problemas</option>
                                    <option value="Gestión de proyectos">Gestión de proyectos</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Rol preferido</label>
                                <select class="form-select" id="rol_preferido">
                                    <option value="">Selecciona un rol</option>
                                    <option value="Líder">Líder</option>
                                    <option value="Investigador">Investigador</option>
                                    <option value="Programador">Programador</option>
                                    <option value="Diseñador">Diseñador</option>
                                    <option value="Analista">Analista</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de proyectos</label>
                                <select class="form-select" id="tipo_proyecto" multiple size="4">
                                    <option value="Investigación">Investigación</option>
                                    <option value="Desarrollo">Desarrollo</option>
                                    <option value="Social">Social</option>
                                    <option value="Ambiental">Ambiental</option>
                                    <option value="Educativo">Educativo</option>
                                </select>
                            </div>

                            <!-- Información de contacto -->
                            <h5 class="text-success mt-4">Información de contacto</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <input type="email" class="form-control" id="correo" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Agregar correo de recuperación</label>
                                <input type="email" class="form-control" id="correoRecuperacion" placeholder="Ingresa un nuevo correo">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Número de teléfono</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="317 6224147">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Agregar número de recuperación</label>
                                <input type="tel" class="form-control" id="telefonoRecuperacion" placeholder="Ingresa un nuevo número">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='perfil.html'">Cancelar</button>
                                <button type="submit" class="btn btn-success">Guardar cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/config.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/editar-perfil.js"></script>
</body>
</html>
